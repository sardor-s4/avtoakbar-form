<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avto Akbar — Ariza</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1565C8;
    --blue-dark: #0D47A1;
    --accent: #FFD600;
    --white: #fff;
    --gray-bg: #F0F2F7;
    --gray-text: #7A8BA8;
    --border: #DDE4F0;
    --text: #0A1A3B;
    --red: #FF3B30;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--white); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* TOPBAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; border-bottom: 1px solid var(--border); }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 900; font-size: 12px; color: var(--accent); }
  .logo-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 700; line-height: 1.2; }
  .logo-text span { display: block; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 400; color: var(--gray-text); }
  .badge { background: #EFF4FF; color: var(--blue); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 700; }

  /* HEADER SLIDER */
  .header-slider { width: 100%; overflow: hidden; position: relative; }
  .hs-track {
    display: flex;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .hs-slide { min-width: 100%; }
  .hs-slide img { width: 100%; display: block; }
  .hs-dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
  }
  .hs-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transition: all 0.3s;
    cursor: pointer;
  }
  .hs-dot.active { background: #fff; width: 20px; border-radius: 3px; }

  /* MAIN */
  .main { padding: 22px 20px 28px; flex: 1; }
  .label-top { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .label-top::before { content: ''; width: 14px; height: 2px; background: var(--blue); border-radius: 2px; }
  h1 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 20px; font-weight: 900; line-height: 1.2; margin-bottom: 7px; }
  h1 em { font-style: normal; color: var(--blue); }
  .sub { font-size: 13px; color: var(--gray-text); line-height: 1.5; margin-bottom: 20px; }

  /* FORM */
  .form { display: flex; flex-direction: column; gap: 11px; }

  input, select {
    width: 100%;
    background: var(--gray-bg);
    border: 1.5px solid transparent;
    border-radius: 14px;
    padding: 15px 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: #B4BDD0; }
  input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(21,101,200,0.08); background: #fff; }

  .phone-wrap { display: flex; background: var(--gray-bg); border: 1.5px solid transparent; border-radius: 14px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .phone-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(21,101,200,0.08); background: #fff; }
  .phone-prefix { display: flex; align-items: center; gap: 6px; padding: 0 14px; font-size: 14px; font-weight: 700; border-right: 1.5px solid var(--border); white-space: nowrap; flex-shrink: 0; }
  .phone-wrap input { flex: 1; border: none; border-radius: 0; background: transparent; padding: 15px 14px; box-shadow: none !important; }

  .err { border-color: var(--red) !important; }
  .err-wrap { border-color: var(--red) !important; }

  .btn { width: 100%; background: var(--blue); color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 700; border: none; border-radius: 14px; padding: 17px; cursor: pointer; margin-top: 4px; box-shadow: 0 4px 18px rgba(21,101,200,0.3); transition: transform 0.1s, background 0.3s; position: relative; overflow: hidden; }
  .btn:active { transform: scale(0.98); }
  .btn.loading { background: #0D47A1; }
  .btn-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .trust { display: flex; justify-content: center; gap: 14px; margin-top: 13px; flex-wrap: wrap; }
  .trust span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-text); }
  .trust span::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #34C759; flex-shrink: 0; }

  /* SOCIAL LINKS */
  .social-links {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-top: 10px;
  }
  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex: 1;
    padding: 13px 6px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .social-link:active { opacity: 0.75; }
  .social-link.tg    { background: #E8F5FF; color: #0088CC; }
  .social-link.insta { background: #FFF0F5; color: #E1306C; }
  .social-link.yt    { background: #FFF2F2; color: #FF0000; }
  .social-link svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* CONSENT */
  .consent-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 2px 0;
  }
  .consent-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: var(--gray-bg);
    padding: 0;
    cursor: pointer;
    margin-top: 1px;
    accent-color: var(--blue);
  }
  .consent-row span {
    font-size: 12px;
    color: var(--gray-text);
    line-height: 1.5;
  }
  .consent-row.err-consent input { outline: 2px solid var(--red); }

  /* PHONE BIG */
  .phone-big {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: #EFF4FF;
    color: var(--blue);
    border-radius: 14px;
    padding: 14px;
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    margin-top: 12px;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
  }
  .phone-big:active { opacity: 0.75; }

  /* SUCCESS */
  .overlay { display: flex; position: fixed; inset: 0; background: rgba(10,26,59,0.5); z-index: 100; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); opacity: 0; visibility: hidden; transition: opacity 0.25s; }
  .overlay.show { opacity: 1; visibility: visible; }
  .success-box { position: relative; background: #fff; border-radius: 24px; padding: 36px 28px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: scale(0.85); opacity: 0; transition: transform 0.4s cubic-bezier(.22,.68,0,1.4), opacity 0.3s; }
  .overlay.show .success-box { transform: scale(1); opacity: 1; }
  .s-icon { width: 64px; height: 64px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; margin: 0 auto 16px; }
  .s-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 8px; }
  .s-text { font-size: 14px; color: var(--gray-text); line-height: 1.6; }
  @keyframes pop { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  .s-timer {
    font-size: 48px;
    font-weight: 900;
    color: var(--blue);
    margin: 16px 0 4px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    animation: pulse 1s ease-in-out infinite;
  }
  .s-timer-label {
    font-size: 12px;
    color: var(--gray-text);
    margin-bottom: 4px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
</style>
</head>
<body>

<!-- SUCCESS -->
<div class="overlay" id="overlay">
  <div class="success-box" onclick="event.stopPropagation()">
    <button onclick="closeOverlay();" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;color:#7A8BA8;cursor:pointer;line-height:1;">×</button>
    <div class="s-icon">✓</div>
    <div class="s-title">Ro'yxatdan o'tdingiz!</div>
    <p class="s-text">Biz sizga <strong>78-555-66-66</strong> raqamidan aloqaga chiqamiz.<br><br>Ungacha bizni Telegramda kuzatib boring 👇</p>
    <div class="s-timer" id="sTimer">7</div>
    <div class="s-timer-label">soniyadan so'ng Telegramga o'tasiz</div>
  </div>
</div>

<script>
    // Phone format
  // Header slider
  (function() {
    const track = document.getElementById('hsTrack');
    const dots = document.querySelectorAll('.hs-dot');
    let cur = 0;
    const total = 3;

    function goTo(n) {
      cur = n;
      track.style.transform = 'translateX(-' + (n * 100) + '%)';
      dots.forEach((d, i) => {
        d.classList.toggle('active', i === n);
      });
    }

    dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

    // Touch swipe
    let startX = 0;
    track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
    track.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (diff > 40) goTo(Math.min(cur + 1, total - 1));
      else if (diff < -40) goTo(Math.max(cur - 1, 0));
    });

    // Auto play
    setInterval(() => goTo((cur + 1) % total), 4000);
  })();

  document.getElementById('phoneInput').addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').slice(0, 9);
    let out = v.slice(0,2);
    if (v.length > 2) out += ' ' + v.slice(2,5);
    if (v.length > 5) out += ' ' + v.slice(5,7);
    if (v.length > 7) out += ' ' + v.slice(7,9);
    this.value = out;
  });



  document.getElementById('phone2Input').addEventListener('input', function() {
    let v = this.value.replace(/\D/g, '').slice(0, 9);
    let out = v.slice(0,2);
    if (v.length > 2) out += ' ' + v.slice(2,5);
    if (v.length > 5) out += ' ' + v.slice(5,7);
    if (v.length > 7) out += ' ' + v.slice(7,9);
    this.value = out;
  });

  // Global timer interval
  let activeInterval = null;

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    const btn = document.querySelector('.btn');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = "Ro'yxatdan o'tish →";
    if (activeInterval) { clearInterval(activeInterval); activeInterval = null; }
    document.getElementById('sTimer').textContent = '7';
  }

  // ⚠️ WEBHOOK URL — Apps Script deploy qilgandan keyin shu yerga URL ni qo'ying
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbznZKI_uUHurDeaLblQbJAIB7IXh8Ir8InYzi5USzkMVPMD2ErbYjiyKKx8easTAO4Y/exec";

  // Kurs va filial nomlarini o'zbekchaga o'girish
  const COURSE_LABELS = {
    "a": "A toifa", "b": "B toifa", "bc": "BC toifa",
    "c": "C toifa", "express": "7 kunlik ekspress kurs", "vojdeniye": "Vojdeniye darslari"
  };
  const FILIAL_LABELS = {
    "chorsu": "Chorsu", "qoraqamish": "Qoraqamish", "ibn-sino": "Ibn Sino",
    "chilonzor-metro": "Chilonzor metro", "qatortol": "Qatortol",
    "chilonzor-19": "Chilonzor 19-kv", "uchtepa": "Uchtepa", "risoviy": "Risoviy",
    "parkentskiy": "Parkentskiy", "kadeshva": "Kadisheva", "ttz": "TTZ",
    "qorasuv-6": "Qorasuv-6", "kokcha": "Ko\'kcha", "sergeli-8": "Sergeli-8",
    "yunusobod": "Yunusobod", "oxunboboyev": "Oxunboboyev",
    "angren": "Angren", "minor": "Minor", "sampi": "Sampi"
  };

  // Submit
  function submitForm() {
    const name = document.getElementById('nameInput');
    const phone = document.getElementById('phoneInput');
    const phone2 = document.getElementById('phone2Input');
    const course = document.getElementById('courseSelect');
    const filial = document.getElementById('filialSelect');
    const phoneWrap = document.getElementById('phoneWrap');

    [name, course, filial].forEach(el => el.classList.remove('err'));
    phoneWrap.classList.remove('err-wrap');

    const consent = document.getElementById('consentCheck');
    const consentRow = consent.closest('.consent-row');
    consentRow.classList.remove('err-consent');

    let ok = true;
    if (!name.value.trim())                        { name.classList.add('err');           ok = false; }
    if (phone.value.replace(/\D/g,'').length < 9)  { phoneWrap.classList.add('err-wrap'); ok = false; }
    if (!course.value)                             { course.classList.add('err');         ok = false; }
    if (!filial.value)                             { filial.classList.add('err');         ok = false; }
    if (!consent.checked)                          { consentRow.classList.add('err-consent'); ok = false; }
    if (!ok) return;

    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.innerHTML = '<span class="btn-spinner"></span>Yuborilmoqda...';

    const payload = {
      name:   name.value.trim(),
      phone:  '+998 ' + phone.value.trim(),
      phone2: phone2.value.trim() ? '+998 ' + phone2.value.trim() : '',
      course: COURSE_LABELS[course.value] || course.value,
      filial: FILIAL_LABELS[filial.value] || filial.value,
      source: 'Tilda forma'
    };

    // Sheets ga yuborish
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    }).catch(() => {});

    // Overlay ochish
    btn.innerHTML = "Ro'yxatdan o'tish →";
    document.getElementById('overlay').classList.add('show');
    let secs = 8;
    const timerEl = document.getElementById('sTimer');
    if (activeInterval) clearInterval(activeInterval);
    activeInterval = setInterval(() => {
      secs--;
      timerEl.textContent = secs;
      if (secs <= 0) {
        clearInterval(activeInterval);
        activeInterval = null;
        window.location.href = 'https://t.me/avtoakbaruz';
      }
    }, 1000);
  }
</script>
</body>
</html>
